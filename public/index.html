<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Taste Match</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <h1 class="app-title">Spotify Taste Match</h1>
    <p class="subtitle" id="subtitle">Compare your music taste with a friend</p>
    
    <div id="status-container"></div>
    
    <div id="button-container"></div>
    
    <div id="error-message" class="error-message"></div>
    
    <div id="ready-message" class="ready-message"></div>
  </div>

  <script>
    // Fetch session status on page load
    async function loadSessionStatus() {
      try {
        const response = await fetch('/api/session-status');
        const session = await response.json();
        
        // Check for query parameters (error or status)
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        const status = urlParams.get('status');
        
        // Display error message if present
        if (error) {
          document.getElementById('error-message').textContent = error;
          document.getElementById('error-message').innerHTML += '<br><button onclick="window.location.href=\'/\'" class="retry-button">Try Again</button>';
        }
        
        // Render UI based on session state
        renderUI(session);
      } catch (err) {
        console.error('Failed to load session status:', err);
        document.getElementById('error-message').textContent = 'Something went wrong. Please refresh the page.';
      }
    }
    
    function renderUI(session) {
      const statusContainer = document.getElementById('status-container');
      const buttonContainer = document.getElementById('button-container');
      const readyMessage = document.getElementById('ready-message');
      
      // Clear existing content
      statusContainer.innerHTML = '';
      buttonContainer.innerHTML = '';
      readyMessage.innerHTML = '';
      
      // State 1: No users authorized
      if (!session.userA && !session.userB) {
        buttonContainer.innerHTML = '<button onclick="connectUserA()" class="primary-button">Connect Your Spotify</button>';
      }
      // State 2: User A connected, User B not
      else if (session.userA && !session.userB) {
        statusContainer.innerHTML = `<p class="status-connected">✓ Connected as ${session.userA.displayName}</p>`;
        buttonContainer.innerHTML = '<button onclick="connectUserB()" class="primary-button">Connect Friend\'s Spotify</button>';
      }
      // State 3: Both connected
      else if (session.userA && session.userB) {
        statusContainer.innerHTML = `
          <p class="status-connected">✓ Connected as ${session.userA.displayName}</p>
          <p class="status-connected">✓ Connected as ${session.userB.displayName}</p>
        `;
        readyMessage.innerHTML = '<p class="ready-text">Ready to compare! (Phase 2 will add comparison functionality)</p>';
      }
    }
    
    function connectUserA() {
      window.location.href = '/login/userA';
    }
    
    function connectUserB() {
      window.location.href = '/login/userB';
    }
    
    // Load status on page load
    loadSessionStatus();
  </script>
</body>
</html>
